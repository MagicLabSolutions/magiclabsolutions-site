advanced_settings:
  ajax_loading: false
  analytics_code: ""
  custom_styles: ""
  header_js: ""
  footer_js: "<script>function initScrollAnimations(){var els=document.querySelectorAll('.animate-on-scroll:not(.scroll-observed)');if(!els.length)return;var observer=new IntersectionObserver(function(entries){entries.forEach(function(entry){if(entry.isIntersecting){entry.target.classList.add('is-visible');observer.unobserve(entry.target)}})},{threshold:0.1,rootMargin:'0px 0px -50px 0px'});els.forEach(function(el){el.classList.add('scroll-observed');observer.observe(el)})}document.addEventListener('DOMContentLoaded',initScrollAnimations);new MutationObserver(function(){initScrollAnimations()}).observe(document.querySelector('.page'),{childList:true,subtree:true});</script>"
