  reviews_heading_1: "Amado por"
  reviews_heading_2: "estudantes"
  reviews_subtitle: "Veja o que estudantes do mundo todo estão dizendo sobre o Brainfold."
  review_1_text: "Escaneei um capítulo inteiro do meu livro de biologia e o Brainfold criou fichas perfeitas em segundos. O tutor AI até me ajudou a entender fotossíntese melhor que meu professor!"
  review_1_author: "Sarah M. -- Estudante de Biologia"
  review_2_text: "O modo batalha é revolucionário para grupos de estudo. Meus amigos e eu nos testamos antes das provas e é muito divertido. Passei de nota 5 para nota 10 em química orgânica."
  review_2_author: "James K. -- Estudante de Pré-medicina"
  review_3_text: "Os resumos são incríveis. Eu envio meus slides de aula e recebo um guia de estudo lindamente organizado com insights e fórmulas destacados. Me poupa horas."
  review_3_author: "Priya R. -- Estudante de Engenharia"
  review_4_text: "Como estudante de medicina, preciso memorizar milhares de termos. As fichas do Brainfold com repetição espaçada substituíram completamente meu método antigo. App indispensável."
  review_4_author: "David L. -- Estudante de Medicina"
  review_5_text: "Adoro que posso simplesmente tirar uma foto das minhas anotações manuscritas e o app faz tudo. Os quizzes realmente testam compreensão, não apenas memorização. Melhor app de estudo."
  review_5_author: "Emma T. -- Estudante do Ensino Médio"
  review_6_text: "O tutor AI é como ter um professor particular disponível 24 horas. Pedi para explicar derivadas passo a passo e ele detalhou tudo perfeitamente com problemas práticos."
  review_6_author: "Carlos M. -- Estudante de Matemática"
