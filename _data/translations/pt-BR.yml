  nav_pricing: Preços
  nav_download: Baixar
  hero_heading_1: "Registre cada"
  hero_heading_2: "momento precioso"
  hero_text: "Acompanhamento inteligente do bebê com uma bela linha do tempo visual. Sono, alimentação, fraldas, crescimento e insights com AI — tudo em um só lugar."
  download_appstore: "Baixe na"
  appstore: "App Store"
  download_google: "Disponível no"
  google_play: "Google Play"
  features_label: Recursos
  features_heading_1: "Tudo o que você precisa,"
  features_heading_2: "nada que você não precisa"
  features_subtitle: "Feito por pais, para pais. O Zuzu torna o acompanhamento do bebê intuitivo, informativo e genuinamente útil."
  feature_timeline_title: Linha do Tempo em Arco
  feature_timeline_desc: "Veja o dia inteiro do seu bebê de uma só vez com uma linha do tempo circular intuitiva. Identifique padrões de sono, alimentação e atividades instantaneamente."
  feature_ai_title: Insights com AI
  feature_ai_desc: "Receba análises personalizadas e previsões com AI. Entenda a rotina do seu bebê e receba recomendações inteligentes."
  feature_logging_title: Registro Rápido
  feature_logging_desc: "Registre alimentação, fraldas, sono e mais com um único toque. Cronômetro de amamentação, controle de mamadeira e tipos de evento personalizados integrados."
  feature_growth_title: Crescimento e Marcos
  feature_growth_desc: "Acompanhe peso, altura e perímetro cefálico com gráficos de crescimento da WHO. Registre marcos e veja como seu bebê está progredindo."
  feature_sleep_title: Previsões Inteligentes de Sono
  feature_sleep_desc: "Saiba quando seu bebê vai ficar cansado. As previsões de sono se adaptam ao ritmo único do seu bebê e melhoram com o tempo."
  feature_widgets_title: Widgets e Wearables
  feature_widgets_desc: "Veja cronômetros e eventos recentes sem abrir o app. Widgets na tela inicial e suporte a smartwatch mantêm as informações ao alcance das mãos."
  screenshots_label: Em Ação
  screenshots_heading_1: "Veja o Zuzu"
