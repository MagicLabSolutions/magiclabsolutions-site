  reviews_label: Avaliações
  reviews_heading_1: "Aprovado por"
  reviews_heading_2: "pais"
  reviews_subtitle: "Veja por que famílias ao redor do mundo confiam no Zuzu para o acompanhamento diário."
  review_1_text: "\"A linha do tempo em arco é genial. Consigo ver o dia inteiro da minha bebê de uma vez e saber na hora quando ela precisa de uma soneca. Nenhum outro app faz isso.\""
  review_1_author: "Jessica W. — Mãe de 2"
  review_2_text: "\"Testamos 5 rastreadores de bebê diferentes antes do Zuzu. Os insights com AI são realmente úteis, não genéricos. Ele percebeu um padrão no sono do nosso filho que nós não notamos.\""
  review_2_author: "Michael & Anna T. — Pais de Primeira Viagem"
  review_3_text: "\"Poder compartilhar o acompanhamento com meu parceiro e nossa babá é uma salvação. Todo mundo fica na mesma página e o registro de cuidadores mostra exatamente o que aconteceu durante o dia.\""
  review_3_author: "Rachel K. — Mãe que Trabalha"
  review_4_text: "\"Os gráficos de crescimento seguindo os padrões da WHO me dão tranquilidade. Exporto o PDF antes de cada consulta com o pediatra e meu médico sempre fica impressionado com os dados.\""
  review_4_author: "Dr. Sarah L. — Pediatra e Mãe"
  review_5_text: "\"O registro rápido com um toque é tudo quando você está exausto às 3 da manhã. O widget faz com que eu nem precise desbloquear o celular. Design brilhante.\""
  review_5_author: "Tom H. — Pai de Gêmeos"
  review_6_text: "\"A previsão de sono é assustadoramente precisa. O Zuzu me disse que minha filha ficaria cansada em 20 minutos e ela estava bocejando bem na hora. Esse app entende meu bebê.\""
  review_6_author: "Lisa M. — Mãe de Primeira Viagem"
  cta_label: Comece Agora
  cta_heading_1: "Pronto para registrar cada"
  cta_heading_2: "momento precioso?"
  cta_subtitle: "Baixe o Zuzu hoje e junte-se a milhares de pais que confiam em nós com os dados mais importantes do seu bebê."
  footer_rights: Todos os direitos reservados.
