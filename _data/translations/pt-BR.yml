about:
  title: Sobre nós
  subtitle: Dois irmãos criando aplicativos que realmente usam.
  description: Projetamos, construímos e oferecemos suporte a aplicativos móveis nativos para iOS e Android que se adaptam perfeitamente a todos os dispositivos.
  content: "<div class=\"about-photo\" style=\"display: flex; justify-content: center;\">\n  <img src=\"/images/evandro_fabio.jpeg\" alt=\"Evandro and Fabio\" style=\"width: 225px; height: 300px; object-fit:\
    \ cover;\" />\n</div>\n\nHi! We're Evandro and Fabio — two brothers from Brazil building apps we genuinely use ourselves. We care a lot about making them useful, simple, and enjoyable. If you have ideas,\
    \ feedback, or something isn't working right, we'd really love to hear from you.\n\n<div class=\"about-socials\">\n  <a href=\"https://www.linkedin.com/in/evandro-harrison-hoffmann\" target=\"_blank\"\
    >\n    <i class=\"fab fa-linkedin\" aria-hidden=\"true\"></i> Evandro\n  </a>\n  <a href=\"https://www.linkedin.com/in/fabio-gustavo-hoffmann-03931625\" target=\"_blank\">\n    <i class=\"fab fa-linkedin\"\
    \ aria-hidden=\"true\"></i> Fabio\n  </a>\n</div>\n\n---\n\n## What We Build\n\n* Native iOS apps with Swift and SwiftUI — buttery-smooth navigation and custom transitions\n* Cross-platform experiences\
    \ for both iPhone/iPad and Android\n* Universal layouts that adapt beautifully across devices and screen sizes\n* Widgets, Live Activities, and platform-specific extensions that surface the right info\
    \ at the right time\n* Privacy-first storage with secure sync across devices\n\n## How We Deliver\n\n* Discovery sprints to clarify user needs, product vision, and launch goals\n* Interactive prototypes\
    \ and design systems aligned with platform guidelines\n* Modular architectures (MVVM, async/await) and automated testing for confident scaling\n* Performance tuning, accessibility audits, and crash\
    \ monitoring to keep experiences polished\n* Launch support — from beta testing to store submissions, release notes, and ASO follow-through\n\n---\n\nReady to build something magical? [Drop us a message](/contact).\n"
