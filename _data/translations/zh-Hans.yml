  reviews_label: 用户评价
  reviews_heading_1: 深受
  reviews_heading_2: 父母信赖
  reviews_subtitle: 看看世界各地的家庭为什么选择 Zuzu 进行日常追踪。
  review_1_text: "\"可视时间轴弧线真是太棒了。我可以一目了然地看到宝宝一整天的情况，立刻知道她什么时候该小睡了。没有其他应用能做到这一点。\""
  review_1_author: "Jessica W. — 两个孩子的妈妈"
  review_2_text: "\"我们在用 Zuzu 之前试了 5 款不同的宝宝追踪器。AI洞察真的很实用，不是千篇一律的建议。它发现了我们儿子睡眠中我们完全忽略的规律。\""
  review_2_author: "Michael & Anna T. — 新手父母"
  review_3_text: "\"能与伴侣和保姆共享追踪记录简直是救星。每个人都能掌握最新情况，看护人日志清楚地记录了一天中发生的所有事情。\""
  review_3_author: "Rachel K. — 职场妈妈"
  review_4_text: "\"遵循WHO标准的生长曲线图让我很安心。每次看儿科医生前我都会导出PDF，医生对数据的详尽程度总是印象深刻。\""
  review_4_author: "Dr. Sarah L. — 儿科医生兼妈妈"
  review_5_text: "\"凌晨三点睡眠不足时，一键记录就是一切。有了小组件，我甚至不需要解锁手机。设计太出色了。\""
  review_5_author: "Tom H. — 双胞胎爸爸"
  review_6_text: "\"睡眠预测功能准确得惊人。Zuzu 告诉我女儿 20 分钟后会犯困，她果然准时开始打哈欠了。这款应用真的懂我的宝宝。\""
  review_6_author: "Lisa M. — 新手妈妈"
