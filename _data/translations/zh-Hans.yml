  feature_timeline_desc: 通过直观的圆形时间轴一目了然地查看宝宝的一整天。立即发现睡眠、喂养和活动的规律。
  feature_ai_title: AI驱动的洞察
  feature_ai_desc: 获取由AI提供的个性化分析和预测。了解宝宝的日常规律，接收智能建议。
  feature_logging_title: 快速操作记录
