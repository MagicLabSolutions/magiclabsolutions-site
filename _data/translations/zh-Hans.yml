  feature_growth_title: 成长与里程碑
  feature_growth_desc: 通过WHO生长曲线图追踪体重、身高和头围。记录里程碑，查看宝宝的成长进度。
  feature_sleep_title: 智能睡眠预测
  feature_sleep_desc: 提前知道宝宝何时会犯困。睡眠预测会根据宝宝独特的作息节奏进行调整，并随时间不断优化。
  feature_widgets_title: 小组件与可穿戴设备
