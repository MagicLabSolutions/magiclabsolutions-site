  reviews_label: Reviews
  reviews_heading_1: "Trusted by"
  reviews_heading_2: "parents"
  reviews_subtitle: "See why families around the world rely on Zuzu for their daily tracking."
  review_1_text: "\"The visual timeline arc is genius. I can see my baby's entire day at a glance and instantly spot when she's due for a nap. No other app does this.\""
  review_1_author: "Jessica W. — Mom of 2"
  review_2_text: "\"We tried 5 different baby trackers before Zuzu. The AI insights are actually useful, not generic. It noticed a pattern in our son's sleep we completely missed.\""
  review_2_author: "Michael & Anna T. — New Parents"
  review_3_text: "\"Being able to share tracking with my partner and our nanny is a lifesaver. Everyone stays on the same page and the caregiver log shows exactly what happened during the day.\""
  review_3_author: "Rachel K. — Working Mom"
  review_4_text: "\"The growth charts following WHO standards give me peace of mind. I export the PDF before every pediatrician visit and my doctor is always impressed with the data.\""
  review_4_author: "Dr. Sarah L. — Pediatrician & Mom"
  review_5_text: "\"Quick logging with one tap is everything when you're sleep-deprived at 3am. The widget means I don't even need to unlock my phone. Brilliant design.\""
  review_5_author: "Tom H. — Dad of Twins"
  review_6_text: "\"The sleep prediction feature is scary accurate. Zuzu told me my daughter would be tired in 20 minutes and she was yawning right on schedule. This app understands my baby.\""
  review_6_author: "Lisa M. — First-Time Mom"
