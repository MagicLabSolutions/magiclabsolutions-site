  title: "Zuzu: Baby- & Schlaf-Tracker — Halte jeden kostbaren Moment fest"
  description: "Zuzu ist eine Premium-App für iOS und Android zum Erfassen von Babyschlaf, Fütterungen, Windeln, Stillen, Wachstum und mehr. Mit einzigartiger visueller Zeitleiste, AI-gestützten Erkenntnissen und WHO-Wachstumskurven."
