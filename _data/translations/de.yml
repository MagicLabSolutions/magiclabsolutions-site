  google_play: "Google Play"
  features_label: Funktionen
  features_heading_1: "Alles, was du brauchst,"
  features_heading_2: "nichts, was du nicht brauchst"
  features_subtitle: "Von Eltern für Eltern entwickelt. Zuzu macht Baby-Tracking intuitiv, aufschlussreich und wirklich hilfreich."
  feature_timeline_title: Visuelle Zeitleiste
  feature_timeline_desc: "Sieh den gesamten Tag deines Babys auf einen Blick mit einer intuitiven kreisförmigen Zeitleiste. Erkenne sofort Muster bei Schlaf, Fütterungen und Aktivitäten."
  feature_ai_title: AI-gestützte Erkenntnisse
  feature_ai_desc: "Erhalte personalisierte Analysen und Vorhersagen, unterstützt durch AI. Verstehe die Routinen deines Babys und erhalte smarte Empfehlungen."
  feature_logging_title: Schnelle Erfassung
  feature_logging_desc: "Erfasse Fütterungen, Windeln, Schlaf und mehr mit einem einzigen Tipp. Stilltimer, Flaschentracking und eigene Ereignistypen sind direkt integriert."
  feature_growth_title: Wachstum & Meilensteine
  feature_growth_desc: "Verfolge Gewicht, Größe und Kopfumfang mit WHO-Wachstumskurven. Halte Meilensteine fest und sieh, wie sich dein Baby entwickelt."
  feature_sleep_title: Intelligente Schlafvorhersagen
  feature_sleep_desc: "Wisse, wann dein Baby als Nächstes müde wird. Schlafvorhersagen passen sich dem individuellen Rhythmus deines Babys an und werden mit der Zeit genauer."
  feature_widgets_title: Widgets & Wearables
  feature_widgets_desc: "Überprüfe Timer und letzte Ereignisse, ohne die App zu öffnen. Homescreen-Widgets und Smartwatch-Unterstützung halten alle Infos griffbereit."
  screenshots_label: In Aktion
