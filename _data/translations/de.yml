  reviews_label: Bewertungen
  reviews_heading_1: "Vertraut von"
  reviews_heading_2: "Eltern"
  reviews_subtitle: "Erfahre, warum Familien auf der ganzen Welt auf Zuzu für ihr tägliches Tracking setzen."
  review_1_text: "\"Die visuelle Zeitleiste ist genial. Ich kann den gesamten Tag meines Babys auf einen Blick sehen und sofort erkennen, wann das nächste Nickerchen fällig ist. Keine andere App kann das.\""
  review_1_author: "Jessica W. — Mutter von 2"
  review_2_text: "\"Wir haben 5 verschiedene Baby-Tracker ausprobiert, bevor wir Zuzu gefunden haben. Die AI-Erkenntnisse sind wirklich nützlich, nicht generisch. Die App hat ein Muster im Schlaf unseres Sohnes erkannt, das uns völlig entgangen war.\""
  review_2_author: "Michael & Anna T. — Frischgebackene Eltern"
  review_3_text: "\"Die Möglichkeit, das Tracking mit meinem Partner und unserer Nanny zu teilen, ist ein Lebensretter. Alle sind auf dem gleichen Stand und das Betreuungsprotokoll zeigt genau, was tagsüber passiert ist.\""
  review_3_author: "Rachel K. — Berufstätige Mutter"
  review_4_text: "\"Die Wachstumskurven nach WHO-Standards geben mir Sicherheit. Ich exportiere das PDF vor jedem Kinderarztbesuch und mein Arzt ist immer beeindruckt von den Daten.\""
  review_4_author: "Dr. Sarah L. — Kinderärztin & Mutter"
  review_5_text: "\"Schnelles Erfassen mit einem Tipp ist alles, wenn man um 3 Uhr morgens übermüdet ist. Mit dem Widget muss ich nicht einmal mein Handy entsperren. Brillantes Design.\""
  review_5_author: "Tom H. — Vater von Zwillingen"
  review_6_text: "\"Die Schlafvorhersage ist unheimlich genau. Zuzu hat mir gesagt, dass meine Tochter in 20 Minuten müde sein wird, und sie hat pünktlich gegähnt. Diese App versteht mein Baby.\""
  review_6_author: "Lisa M. — Erstlingsmutter"
  cta_label: Jetzt starten
  cta_heading_1: "Bereit, jeden"
  cta_heading_2: "kostbaren Moment festzuhalten?"
  cta_subtitle: "Lade Zuzu noch heute herunter und schließe dich tausenden Eltern an, die uns mit den wichtigsten Daten ihres Babys vertrauen."
  footer_rights: Alle Rechte vorbehalten.
