  reviews_label: Bewertungen
  reviews_heading_1: "Geliebt von"
  reviews_heading_2: "Studenten"
  reviews_subtitle: "Erfahre, was Studenten weltweit über Brainfold sagen."
  review_1_text: "Ich habe mein gesamtes Biologie-Lehrbuchkapitel gescannt und Brainfold hat in Sekunden perfekte Karteikarten erstellt. Der AI Tutor hat mir sogar geholfen, Photosynthese besser zu verstehen als mein Professor!"
  review_1_author: "Sarah M. -- Biologie-Studentin"
  review_2_text: "Der Battle-Modus ist ein Gamechanger für Lerngruppen. Meine Freunde und ich quizzen uns jetzt vor Prüfungen und es macht wirklich Spaß. Von einer 4 auf eine 1 in organischer Chemie."
  review_2_author: "James K. -- Medizinstudent"
  review_3_text: "Die Zusammenfassungen sind unglaublich. Ich lade meine Vorlesungsfolien hoch und bekomme einen wunderschön organisierten Lernleitfaden mit hervorgehobenen Erkenntnissen und Formeln. Spart mir Stunden."
  review_3_author: "Priya R. -- Ingenieurstudentin"
  review_4_text: "Als Medizinstudent muss ich Tausende von Begriffen auswendig lernen. Brainfolds Karteikarten mit Wiederholungssystem haben meine alte Lernmethode komplett ersetzt. Absolute Must-have-App."
  review_4_author: "David L. -- Medizinstudent"
  review_5_text: "Ich liebe es, dass ich einfach ein Foto meiner handgeschriebenen Notizen machen kann und die App alles erledigt. Die Quizze prüfen wirklich Verständnis, nicht nur Auswendiglernen. Beste Lern-App aller Zeiten."
  review_5_author: "Emma T. -- Abiturientin"
  review_6_text: "Der AI Tutor fühlt sich an wie ein Privatlehrer, der rund um die Uhr verfügbar ist. Ich habe ihn gebeten, Ableitungen Schritt für Schritt zu erklären, und er hat alles perfekt aufgeschlüsselt."
  review_6_author: "Carlos M. -- Mathestudent"
