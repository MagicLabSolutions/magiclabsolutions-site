  hero_heading_1: "Halte jeden"
  hero_heading_2: "kostbaren Moment fest"
  hero_text: "Intelligentes Baby-Tracking mit einer wunderschönen visuellen Zeitleiste. Schlaf, Fütterungen, Windeln, Wachstum und AI-gestützte Erkenntnisse – alles an einem Ort."
  download_appstore: "Laden im"
