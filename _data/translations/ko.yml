  how_it_works_heading_1: "노트에서"
  how_it_works_heading_2: "마스터로"
  how_it_works_subtitle: "어떤 자료든 완전한 학습 시스템으로 변환하는 4가지 간단한 단계."
  step_1_title: 스캔
  step_1_desc: "노트, 교과서를 촬영하거나 PDF 문서를 업로드하세요."
  step_2_title: 처리
  step_2_desc: "AI가 콘텐츠를 분석하고 플래시카드, 퀴즈, 요약을 생성합니다."
