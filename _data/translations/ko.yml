  features_heading_1: "완벽한"
  features_heading_2: "학습 도구"
  features_subtitle: "어떤 문서든 스캔하고 AI가 필요한 모든 학습 형식으로 변환하도록 하세요. 한 번의 스캔으로 무한한 학습 방법."
  feature_flashcards_title: AI 플래시카드
  feature_flashcards_desc: "간격 반복 학습이 적용된 노트 기반 자동 생성 플래시카드. 스와이프하며 모든 개념을 마스터하세요."
  feature_quizzes_title: 스마트 퀴즈
  feature_quizzes_desc: "AI가 단순 암기가 아닌 진정한 이해력을 테스트하는 도전적인 객관식 퀴즈를 만듭니다."
  feature_summaries_title: 풍부한 요약
  feature_summaries_desc: "핵심 인사이트, 공식, 하이라이트, 요점이 포함된 구조화된 요약을 받으세요. 완벽한 노트가 즉시."
  feature_tutor_title: AI Tutor
  feature_tutor_desc: "학습 자료를 이해하는 AI 튜터와 채팅하세요. 질문하고, 설명을 받고, 도전 과제로 연습하세요."
  feature_battle_title: 배틀 모드
  feature_battle_desc: "자신의 학습 자료로 친구와 실시간 퀴즈 배틀에 도전하세요. 공부를 경쟁적이고 재미있게 만드세요."
  feature_scan_title: 무엇이든 스캔
  feature_scan_desc: "교과서, 손글씨 노트, PDF를 촬영하세요. AI가 자동으로 모든 것을 추출하고 처리합니다."
