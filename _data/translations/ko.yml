  reviews_label: 리뷰
  reviews_heading_1: "학생들이"
  reviews_heading_2: "사랑합니다"
  reviews_subtitle: "전 세계 학생들이 Brainfold에 대해 어떻게 말하는지 확인하세요."
  review_1_text: "생물학 교과서 챕터 전체를 스캔했는데 Brainfold가 몇 초 만에 완벽한 플래시카드를 만들어 줬어요. AI 튜터는 교수님보다 광합성을 더 잘 설명해 줬습니다!"
  review_1_author: "Sarah M. -- 생물학 전공"
  review_2_text: "배틀 모드는 스터디 그룹에 혁명적입니다. 친구들과 시험 전에 퀴즈를 내는 게 정말 재미있어요. 유기화학 성적이 C에서 A로 올랐습니다."
  review_2_author: "James K. -- 의예과 학생"
  review_3_text: "요약이 놀랍습니다. 강의 슬라이드를 업로드하면 핵심 인사이트와 공식이 강조된 아름다운 학습 가이드를 받습니다. 몇 시간을 절약해 줍니다."
  review_3_author: "Priya R. -- 공학부 학생"
  review_4_text: "의대생으로서 수천 개의 용어를 외워야 합니다. Brainfold의 간격 반복 플래시카드가 이전 학습 방법을 완전히 대체했습니다. 필수 앱입니다."
  review_4_author: "David L. -- 의대생"
  review_5_text: "손글씨 노트 사진만 찍으면 앱이 모든 걸 해줘서 좋아요. 퀴즈가 단순 암기가 아니라 진짜 이해를 테스트해요. 최고의 학습 앱입니다."
  review_5_author: "Emma T. -- 고등학교 3학년"
  review_6_text: "AI 튜터는 24시간 이용 가능한 개인 과외 선생님 같습니다. 미분을 단계별로 설명해 달라고 했더니 연습 문제와 함께 완벽하게 설명해 줬습니다."
  review_6_author: "Carlos M. -- 수학 전공"
