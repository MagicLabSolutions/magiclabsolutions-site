brainfold_page:
  title: "Brainfold -- AI 기반 학습 도우미"
  description: "Brainfold는 노트를 플래시카드, 퀴즈, 요약, AI 튜터로 변환합니다. 스캔하고, 공부하고, 친구와 배틀하세요 -- 모두 AI로."
  nav_features: 기능
  nav_screenshots: 스크린샷
  nav_how_it_works: 사용 방법
  nav_download: 다운로드
  hero_heading_1: "더 스마트하게"
  hero_heading_2: "공부하세요"
  hero_heading_accent: "AI 파워"
  hero_text: "노트를 스캔하고 AI가 플래시카드, 퀴즈, 요약, 개인 튜터를 만들도록 하세요. 혼자 공부하거나 친구와 배틀하세요."
  download_appstore: "다운로드"
  appstore: "App Store"
