  feature_timeline_title: 비주얼 타임라인 아크
  feature_timeline_desc: "직관적인 원형 타임라인으로 아기의 하루를 한눈에 확인하세요. 수면, 수유, 활동 패턴을 즉시 파악할 수 있습니다."
  feature_ai_title: AI 기반 인사이트
  feature_ai_desc: "AI가 분석한 맞춤형 분석과 예측을 받아보세요. 아기의 루틴을 이해하고 스마트한 추천을 제공합니다."
  feature_logging_title: 빠른 활동 기록
  feature_logging_desc: "한 번의 탭으로 수유, 기저귀, 수면 등을 기록하세요. 수유 타이머, 젖병 기록, 사용자 지정 이벤트 유형이 기본 내장되어 있습니다."
  feature_growth_title: 성장 및 이정표
  feature_growth_desc: "WHO 성장 차트로 체중, 신장, 머리둘레를 추적하세요. 이정표를 기록하고 아기의 발달 과정을 확인하세요."
  feature_sleep_title: 스마트 수면 예측
  feature_sleep_desc: "아기가 다음에 언제 졸려할지 알 수 있습니다. 수면 예측은 아기만의 고유한 리듬에 맞춰 시간이 갈수록 정확해집니다."
  feature_widgets_title: 위젯 & 웨어러블
  feature_widgets_desc: "앱을 열지 않아도 타이머와 최근 활동을 확인하세요. 홈 화면 위젯과 스마트워치 지원으로 정보를 손끝에서 바로 확인할 수 있습니다."
