  reviews_label: 리뷰
  reviews_heading_1: "부모들이"
  reviews_heading_2: "신뢰합니다"
  reviews_subtitle: "전 세계 가족들이 일상 기록에 Zuzu를 사용하는 이유를 확인하세요."
  review_1_text: "\"비주얼 타임라인 아크는 정말 천재적이에요. 아기의 하루를 한눈에 볼 수 있고 언제 낮잠이 필요한지 바로 알 수 있어요. 이런 앱은 다른 데 없어요.\""
  review_1_author: "Jessica W. — 두 아이의 엄마"
  review_2_text: "\"Zuzu 전에 아기 트래커 5개나 써봤어요. AI 인사이트가 뻔하지 않고 정말 유용해요. 우리가 놓친 아들의 수면 패턴을 AI가 발견해 줬어요.\""
  review_2_author: "Michael & Anna T. — 초보 부모"
  review_3_text: "\"남편과 베이비시터와 함께 기록을 공유할 수 있어서 정말 편해요. 모두가 같은 정보를 보고, 보호자 기록으로 낮 동안 무슨 일이 있었는지 정확히 알 수 있어요.\""
  review_3_author: "Rachel K. — 워킹맘"
  review_4_text: "\"WHO 기준 성장 차트가 마음의 안정을 줘요. 소아과 방문 전에 PDF로 내보내면 의사 선생님이 데이터에 항상 감탄하세요.\""
  review_4_author: "Dr. Sarah L. — 소아과 의사이자 엄마"
  review_5_text: "\"새벽 3시에 잠이 부족할 때 한 번 탭으로 기록할 수 있는 게 전부예요. 위젯 덕분에 폰 잠금을 풀 필요도 없어요. 정말 훌륭한 디자인이에요.\""
  review_5_author: "Tom H. — 쌍둥이 아빠"
  review_6_text: "\"수면 예측 기능이 무서울 정도로 정확해요. Zuzu가 딸이 20분 후에 졸려할 거라고 했는데 딱 맞춰서 하품을 하더라고요. 이 앱은 우리 아기를 진짜 이해해요.\""
  review_6_author: "Lisa M. — 초보 엄마"
  cta_label: 시작하기
  cta_heading_1: "소중한 모든 순간을"
  cta_heading_2: "기록할 준비가 되셨나요?"
  cta_subtitle: "지금 Zuzu를 다운로드하고, 아기의 소중한 데이터를 믿고 맡기는 수천 명의 부모들과 함께하세요."
