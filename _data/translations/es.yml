  reviews_label: Reseñas
  reviews_heading_1: "La confianza de"
  reviews_heading_2: "los padres"
  reviews_subtitle: "Descubre por qué familias de todo el mundo confían en Zuzu para su seguimiento diario."
  review_1_text: "\"La línea de tiempo en arco es genial. Puedo ver el día completo de mi bebé de un vistazo y saber al instante cuándo le toca una siesta. Ninguna otra app hace esto.\""
  review_1_author: "Jessica W. — Mamá de 2"
  review_2_text: "\"Probamos 5 apps de seguimiento antes de Zuzu. La información con AI es realmente útil, no genérica. Detectó un patrón en el sueño de nuestro hijo que no habíamos notado.\""
  review_2_author: "Michael & Anna T. — Padres primerizos"
  review_3_text: "\"Poder compartir el seguimiento con mi pareja y nuestra niñera es una salvación. Todos están al tanto y el registro de cuidadores muestra exactamente lo que pasó durante el día.\""
  review_3_author: "Rachel K. — Mamá que trabaja"
  review_4_text: "\"Los gráficos de crecimiento basados en los estándares de la WHO me dan tranquilidad. Exporto el PDF antes de cada visita al pediatra y mi doctor siempre queda impresionado con los datos.\""
  review_4_author: "Dr. Sarah L. — Pediatra y mamá"
  review_5_text: "\"El registro rápido con un solo toque lo es todo cuando estás agotado a las 3am. El widget significa que ni siquiera necesito desbloquear mi teléfono. Diseño brillante.\""
  review_5_author: "Tom H. — Papá de gemelos"
  review_6_text: "\"La predicción de sueño es increíblemente precisa. Zuzu me dijo que mi hija tendría sueño en 20 minutos y estaba bostezando justo a tiempo. Esta app entiende a mi bebé.\""
  review_6_author: "Lisa M. — Mamá primeriza"
