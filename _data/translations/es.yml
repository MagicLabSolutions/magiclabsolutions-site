  reviews_heading_1: "Amado por"
  reviews_heading_2: "estudiantes"
  reviews_subtitle: "Descubre lo que dicen los estudiantes de todo el mundo sobre Brainfold."
  review_1_text: "Escaneé todo un capítulo de mi libro de biología y Brainfold creó tarjetas perfectas en segundos. El tutor AI incluso me ayudó a entender la fotosíntesis mejor que mi profesor."
  review_1_author: "Sarah M. -- Estudiante de Biología"
  review_2_text: "El modo batalla es revolucionario para grupos de estudio. Mis amigos y yo nos hacemos cuestionarios antes de los exámenes y es muy divertido. Pasé de un aprobado a un sobresaliente en química orgánica."
  review_2_author: "James K. -- Estudiante de Premedicina"
  review_3_text: "Los resúmenes son increíbles. Subo mis diapositivas y obtengo una guía de estudio bellamente organizada con ideas clave y fórmulas resaltadas. Me ahorra horas."
  review_3_author: "Priya R. -- Estudiante de Ingeniería"
  review_4_text: "Como estudiante de medicina, necesito memorizar miles de términos. Las tarjetas de Brainfold con repetición espaciada han reemplazado completamente mi método anterior. App imprescindible."
  review_4_author: "David L. -- Estudiante de Medicina"
  review_5_text: "Me encanta que puedo simplemente tomar una foto de mis apuntes a mano y la app hace todo. Los cuestionarios realmente evalúan comprensión, no solo memorización. La mejor app de estudio."
  review_5_author: "Emma T. -- Estudiante de bachillerato"
  review_6_text: "El tutor AI se siente como tener un tutor privado disponible las 24 horas. Le pedí que explicara derivadas paso a paso y lo desglosó todo perfectamente con problemas de práctica."
  review_6_author: "Carlos M. -- Estudiante de Matemáticas"
