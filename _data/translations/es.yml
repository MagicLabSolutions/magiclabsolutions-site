  features_label: Funciones
  features_heading_1: "Todo lo que necesitas,"
  features_heading_2: "nada de más"
  features_subtitle: "Diseñado por padres, para padres. Zuzu hace que el seguimiento del bebé sea intuitivo, informativo y realmente útil."
  feature_timeline_title: Línea de tiempo en arco
  feature_timeline_desc: "Observa el día completo de tu bebé de un vistazo con una línea de tiempo circular e intuitiva. Detecta patrones de sueño, alimentación y actividades al instante."
  feature_ai_title: "Información impulsada por AI"
  feature_ai_desc: "Obtén análisis y predicciones personalizadas con AI. Comprende las rutinas de tu bebé y recibe recomendaciones inteligentes."
  feature_logging_title: Registro rápido de acciones
  feature_logging_desc: "Registra alimentación, pañales, sueño y más con un solo toque. Temporizador de lactancia, seguimiento de biberón y tipos de eventos personalizados integrados."
  feature_growth_title: Crecimiento y logros
  feature_growth_desc: "Registra peso, estatura y perímetro cefálico con gráficos de crecimiento de la WHO. Anota logros y observa el progreso de tu bebé."
  feature_sleep_title: Predicciones inteligentes de sueño
  feature_sleep_desc: "Sabe cuándo tu bebé tendrá sueño. Las predicciones se adaptan al ritmo único de tu bebé y mejoran con el tiempo."
  feature_widgets_title: Widgets y wearables
  feature_widgets_desc: "Consulta temporizadores y eventos recientes sin abrir la app. Los widgets en la pantalla de inicio y la compatibilidad con smartwatch mantienen la información al alcance de tu mano."
  screenshots_label: En acción
  screenshots_heading_1: "Mira Zuzu"
  screenshots_heading_2: "en acción"
  screenshots_subtitle: "Desde líneas de tiempo visuales hasta información detallada, cada pantalla está diseñada para hacer la crianza un poco más fácil."
