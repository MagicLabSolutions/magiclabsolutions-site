zuzu_page:
  title: "Zuzu: Seguimiento de Bebé y Sueño — Registra cada momento especial"
  description: "Zuzu es una app premium para iOS y Android para hacer seguimiento del sueño, alimentación, pañales, lactancia, crecimiento y más. Incluye una línea de tiempo visual única en arco, información impulsada por AI y gráficos de crecimiento de la WHO."
  nav_features: Funciones
  nav_screenshots: Capturas
  nav_pricing: Precios
  nav_download: Descargar
  hero_heading_1: "Registra cada"
  hero_heading_2: "momento especial"
  hero_text: "Seguimiento inteligente del bebé con una hermosa línea de tiempo visual. Sueño, alimentación, pañales, crecimiento e información impulsada por AI — todo en un solo lugar."
  download_appstore: "Descárgalo en la"
