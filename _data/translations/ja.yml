  reviews_label: レビュー
  reviews_heading_1: パパ・ママに
  reviews_heading_2: 選ばれています
  reviews_subtitle: 世界中の家族が毎日の記録に Zuzu を使う理由をご覧ください。
  review_1_text: "\"ビジュアルタイムラインアークは天才的。赤ちゃんの一日を一目で見渡せて、次のお昼寝のタイミングもすぐわかります。他のアプリにはこの機能はありません。\""
  review_1_author: "Jessica W. — 2児のママ"
  review_2_text: "\"Zuzu の前に5つのベビートラッカーを試しました。AIインサイトが本当に役立つんです。息子の睡眠パターンで私たちが見逃していたことをAIが気づいてくれました。\""
  review_2_author: "Michael & Anna T. — 新米パパ・ママ"
  review_3_text: "\"パートナーやベビーシッターと記録を共有できるのは本当に助かります。全員が同じ情報を共有でき、ケアギバーログで日中に何があったか一目瞭然です。\""
  review_3_author: "Rachel K. — ワーキングマザー"
  review_4_text: "\"WHO基準の成長チャートがあると安心です。小児科の受診前にPDFを出力していますが、先生もいつもデータの充実ぶりに感心してくれます。\""
  review_4_author: "Dr. Sarah L. — 小児科医＆ママ"
  review_5_text: "\"午前3時に寝不足の状態でもワンタップで記録できるのが最高です。ウィジェットのおかげでスマホのロック解除すら不要。素晴らしいデザインです。\""
  review_5_author: "Tom H. — 双子のパパ"
  review_6_text: "\"睡眠予測が驚くほど正確です。娘が20分後に眠くなるとZuzuが教えてくれて、その通りにあくびし始めました。このアプリは私の赤ちゃんを理解しています。\""
  review_6_author: "Lisa M. — 初めてのママ"
