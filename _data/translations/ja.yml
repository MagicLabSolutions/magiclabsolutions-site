  reviews_heading_1: "学生に"
  reviews_heading_2: "愛されています"
  reviews_subtitle: "世界中の学生がBrainfoldについて何と言っているかをご覧ください。"
  review_1_text: "生物学の教科書の章をまるごとスキャンしたら、Brainfoldが数秒で完璧なフラッシュカードを作成してくれました。AIチューターは教授よりも光合成を分かりやすく説明してくれました！"
  review_1_author: "Sarah M. -- 生物学専攻"
  review_2_text: "バトルモードは勉強グループにとって革命的です。友達と試験前にクイズし合うのが本当に楽しいです。有機化学の成績がCからAに上がりました。"
  review_2_author: "James K. -- 医学部予科生"
  review_3_text: "要約が素晴らしいです。講義スライドをアップロードすると、重要なインサイトと数式がハイライトされた美しい学習ガイドが得られます。何時間も節約できます。"
  review_3_author: "Priya R. -- 工学部生"
  review_4_text: "医学生として何千もの用語を覚える必要があります。Brainfoldの間隔反復フラッシュカードは以前の学習法を完全に置き換えました。絶対に必要なアプリです。"
  review_4_author: "David L. -- 医学生"
  review_5_text: "手書きノートの写真を撮るだけでアプリがすべてやってくれるのが大好きです。クイズは暗記ではなく本当の理解をテストしてくれます。最高の学習アプリです。"
  review_5_author: "Emma T. -- 高校3年生"
  review_6_text: "AIチューターは24時間利用可能な個人教師のようです。微分をステップバイステップで説明してもらったら、練習問題付きで完璧に分解してくれました。"
  review_6_author: "Carlos M. -- 数学専攻"
