zuzu_page:
  title: "Zuzu : Suivi Bébé & Sommeil — Suivez chaque moment précieux"
  description: "Zuzu est une application premium pour iOS et Android pour suivre le sommeil, les repas, les couches, l'allaitement, la croissance de bébé et bien plus. Inclut une chronologie visuelle en arc unique, des analyses propulsées par l'AI et les courbes de croissance WHO."
  nav_features: Fonctionnalités
  nav_screenshots: Captures d'écran
  nav_pricing: Tarifs
  nav_download: Télécharger
  hero_heading_1: "Suivez chaque"
  hero_heading_2: "moment précieux"
  hero_text: "Suivi intelligent de bébé avec une belle chronologie visuelle. Sommeil, repas, couches, croissance et analyses propulsées par l'AI — tout en un seul endroit."
  download_appstore: "Télécharger sur l'"
  appstore: "App Store"
  download_google: "Disponible sur"
  google_play: "Google Play"
  features_label: Fonctionnalités
  features_heading_1: "Tout ce qu'il vous faut,"
  features_heading_2: "rien de superflu"
  features_subtitle: "Conçu par des parents, pour des parents. Zuzu rend le suivi de bébé intuitif, pertinent et vraiment utile."
  feature_timeline_title: Chronologie visuelle en arc
  feature_timeline_desc: "Visualisez la journée entière de votre bébé en un coup d'œil grâce à une chronologie circulaire intuitive. Repérez instantanément les habitudes de sommeil, de repas et d'activités."
  feature_ai_title: "Analyses propulsées par l'AI"
  feature_ai_desc: "Obtenez des analyses personnalisées et des prédictions grâce à l'AI. Comprenez les routines de votre bébé et recevez des recommandations intelligentes."
  feature_logging_title: Enregistrement rapide
  feature_logging_desc: "Enregistrez repas, couches, sommeil et plus d'un seul geste. Minuterie d'allaitement, suivi du biberon et types d'événements personnalisés intégrés."
  feature_growth_title: Croissance et étapes clés
  feature_growth_desc: "Suivez le poids, la taille et le périmètre crânien avec les courbes de croissance WHO. Notez les étapes clés et observez les progrès de votre bébé."
  feature_sleep_title: Prédictions de sommeil intelligentes
  feature_sleep_desc: "Sachez quand votre bébé sera fatigué. Les prédictions de sommeil s'adaptent au rythme unique de votre bébé et s'améliorent avec le temps."
  feature_widgets_title: Widgets et accessoires connectés
  feature_widgets_desc: "Consultez les minuteries et les événements récents sans ouvrir l'application. Les widgets sur l'écran d'accueil et la montre connectée gardent les infos à portée de main."
  screenshots_label: En action
  screenshots_heading_1: "Découvrez Zuzu"
  screenshots_heading_2: "en action"
  screenshots_subtitle: "Des chronologies visuelles aux analyses détaillées, chaque écran est conçu pour rendre la vie de parent un peu plus facile."
