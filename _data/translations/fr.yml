  reviews_label: Avis
  reviews_heading_1: "Approuvé par"
  reviews_heading_2: "les parents"
  reviews_subtitle: "Découvrez pourquoi des familles du monde entier font confiance à Zuzu pour leur suivi quotidien."
  review_1_text: "\"La chronologie visuelle en arc est géniale. Je vois la journée entière de mon bébé en un coup d'œil et je repère immédiatement quand elle a besoin d'une sieste. Aucune autre appli ne fait ça.\""
  review_1_author: "Jessica W. — Maman de 2 enfants"
  review_2_text: "\"Nous avons essayé 5 applis de suivi bébé avant Zuzu. Les analyses AI sont vraiment utiles, pas génériques. L'appli a détecté un schéma dans le sommeil de notre fils que nous avions complètement raté.\""
  review_2_author: "Michael & Anna T. — Jeunes parents"
  review_3_text: "\"Pouvoir partager le suivi avec mon conjoint et notre nounou est une bouée de sauvetage. Tout le monde est sur la même longueur d'onde et le journal des aidants montre exactement ce qui s'est passé dans la journée.\""
  review_3_author: "Rachel K. — Maman active"
  review_4_text: "\"Les courbes de croissance conformes aux normes WHO me rassurent. J'exporte le PDF avant chaque visite chez le pédiatre et mon médecin est toujours impressionné par les données.\""
  review_4_author: "Dr. Sarah L. — Pédiatre et maman"
  review_5_text: "\"L'enregistrement rapide en un geste, c'est essentiel quand on est épuisé à 3 h du matin. Le widget permet de ne même pas déverrouiller son téléphone. Un design brillant.\""
  review_5_author: "Tom H. — Papa de jumeaux"
  review_6_text: "\"La prédiction de sommeil est d'une précision redoutable. Zuzu m'a dit que ma fille serait fatiguée dans 20 minutes et elle bâillait pile à l'heure. Cette appli comprend mon bébé.\""
  review_6_author: "Lisa M. — Maman pour la première fois"
  cta_label: Commencer
  cta_heading_1: "Prêt à suivre chaque"
  cta_heading_2: "moment précieux ?"
  cta_subtitle: "Téléchargez Zuzu aujourd'hui et rejoignez des milliers de parents qui nous font confiance pour les données les plus importantes de leur bébé."
  footer_rights: Tous droits réservés.
