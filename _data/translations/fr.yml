  reviews_heading_1: "Adoré par les"
  reviews_heading_2: "étudiants"
  reviews_subtitle: "Découvrez ce que les étudiants du monde entier disent de Brainfold."
  review_1_text: "J'ai scanné tout un chapitre de mon manuel de biologie et Brainfold a créé des fiches parfaites en quelques secondes. Le tuteur AI m'a même aidé à comprendre la photosynthèse mieux que mon professeur !"
  review_1_author: "Sarah M. -- Étudiante en Biologie"
  review_2_text: "Le mode bataille est révolutionnaire pour les groupes d'étude. Mes amis et moi nous interrogeons avant les examens et c'est vraiment amusant. Je suis passé de 10 à 18 en chimie organique."
  review_2_author: "James K. -- Étudiant en Prémédecine"
  review_3_text: "Les résumés sont incroyables. Je télécharge mes diapositives et j'obtiens un guide d'étude magnifiquement organisé avec les points clés et les formules en évidence. Ça me fait gagner des heures."
  review_3_author: "Priya R. -- Étudiante en Ingénierie"
  review_4_text: "En tant qu'étudiant en médecine, je dois mémoriser des milliers de termes. Les fiches Brainfold avec répétition espacée ont complètement remplacé mon ancienne méthode. Application indispensable."
  review_4_author: "David L. -- Étudiant en Médecine"
  review_5_text: "J'adore pouvoir simplement prendre une photo de mes notes manuscrites et l'app fait tout. Les quiz testent vraiment la compréhension, pas juste la mémorisation. La meilleure app d'étude."
  review_5_author: "Emma T. -- Lycéenne en Terminale"
  review_6_text: "Le tuteur AI, c'est comme avoir un professeur particulier disponible 24h/24. Je lui ai demandé d'expliquer les dérivées étape par étape et il a tout décomposé parfaitement avec des exercices pratiques."
  review_6_author: "Carlos M. -- Étudiant en Mathématiques"
