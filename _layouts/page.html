---
layout: default
---

<section class="page-hero">
	<div class="wrap">
		<h1>{{ page.title }}</h1>
		{% if page.subtitle %}
		<p>{{ page.subtitle }}</p>
		{% endif %}
	</div>
</section>

<section class="single">
	<div class="wrap">
		<article class="single-post">
			{{ page.content }}
		</article>
	</div>
</section>
