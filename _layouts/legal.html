---
layout: default
---

{% assign t = site.data.translations[site.active_lang] %}

<section class="legal-hero">
	<div class="wrap">
		<p class="legal-hero__label">{{ t.legal.label | default: "Legal" }}</p>
		<h1>{{ page.title }}</h1>
		{% if page.effective_date %}
		<p class="legal-hero__updated">{{ t.legal.effective | default: "Effective" }} {{ page.effective_date }}</p>
		{% endif %}
	</div>
</section>

<section class="legal-content">
	<div class="wrap">
		<article class="legal-post">
			{{ page.content }}
		</article>
	</div>
</section>
