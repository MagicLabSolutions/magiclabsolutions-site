---
layout: default
---

{% if page.accent_color %}
<style>:root { --app-accent: {{ page.accent_color }}; }</style>
{% endif %}

<section class="app-hero">
	<div class="wrap">
		{% if page.app_icon %}
		<div class="app-hero__icon">
			<img src="{{ page.app_icon | relative_url }}" alt="{{ page.title }} icon" />
		</div>
		{% endif %}
		<h1>{{ page.title }}</h1>
		<p class="app-hero__tagline">{{ page.subtitle }}</p>
		{% if page.app_store_url %}
		<div class="app-hero__cta">
			<a href="{{ page.app_store_url }}" target="_blank" rel="noopener">
				<img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store" />
			</a>
		</div>
		{% endif %}
	</div>
</section>

<section class="single">
	<div class="wrap">
		<article class="single-post">
			{{ page.content }}
		</article>
	</div>
</section>
