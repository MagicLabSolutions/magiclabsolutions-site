<div class="lang-switcher">
	<button class="lang-switcher__toggle" aria-label="Change language">
		<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
		<span>{{ site.data.language_names[site.active_lang] }}</span>
		<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
	</button>
	<ul class="lang-switcher__dropdown">
		{% for lang in site.languages %}
		{% if lang == site.active_lang %}
		<li class="lang-switcher__item lang-switcher__item--active">{{ site.data.language_names[lang] }}</li>
		{% elsif lang == site.default_lang %}
		<li class="lang-switcher__item">
			<a href="{{ site.url }}{{ page.url }}">{{ site.data.language_names[lang] }}</a>
		</li>
		{% else %}
		<li class="lang-switcher__item">
			<a href="{{ site.url }}/{{ lang }}{{ page.url }}">{{ site.data.language_names[lang] }}</a>
		</li>
		{% endif %}
		{% endfor %}
	</ul>
</div>
